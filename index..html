<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Life Progress Wallpaper</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif;
  background: #000; color: #fff;
  transition: background 0.5s ease, color 0.5s ease;
}
body.light { background: #ffffff; color: #000; }

/* ── Animations ── */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
@keyframes slideOutRight { from { transform: translateX(0); } to { transform: translateX(100%); } }
@keyframes slideInLeft { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes slideOutLeft { from { transform: translateX(0); opacity: 1; } to { transform: translateX(-30px); opacity: 0; } }
@keyframes numIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes breathe { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }
@keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.4); } }
@keyframes confettiFall {
  0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}
@keyframes trophyBounce {
  0%, 100% { transform: translateY(0) scale(1); }
  30% { transform: translateY(-18px) scale(1.1); }
  50% { transform: translateY(-8px) scale(1.05); }
  70% { transform: translateY(-14px) scale(1.08); }
}
@keyframes shimmer {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}
@keyframes ripple {
  0% { transform: scale(0.8); opacity: 0.6; }
  100% { transform: scale(2.5); opacity: 0; }
}
@keyframes countPop {
  0% { transform: scale(0.5); opacity: 0; }
  60% { transform: scale(1.2); }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes starFloat {
  0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.6; }
  50% { transform: translateY(-8px) rotate(180deg); opacity: 1; }
}

.fade-in { animation: fadeIn 1s ease forwards; }

/* ── Wizard ── */
.wizard {
  min-height: 100vh; min-height: 100dvh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 2rem; text-align: center;
}
.wizard h2 {
  font-size: 1.6rem; font-weight: 500; letter-spacing: -0.02em; margin-bottom: 0.5rem;
  background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
body.light .wizard h2 {
  background: linear-gradient(135deg, #000 0%, rgba(0,0,0,0.6) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.sub { opacity: 0.35; font-size: 0.9rem; margin-bottom: 2rem; font-weight: 300; }
.wizard input[type="date"] {
  width: 100%; max-width: 300px; padding: 0.85rem 1.25rem; border-radius: 0.75rem;
  font-size: 1.1rem; outline: none;
  background: rgba(255,255,255,0.05); color: #fff;
  border: 1px solid rgba(255,255,255,0.08);
  font-family: 'SF Mono', 'Fira Code', monospace;
  transition: border-color 0.2s;
}
body.light .wizard input[type="date"] {
  background: rgba(0,0,0,0.04); color: #000;
  border-color: rgba(0,0,0,0.1);
}
.wizard input[type="date"]:focus { border-color: rgba(255,255,255,0.2); }
body.light .wizard input[type="date"]:focus { border-color: rgba(0,0,0,0.2); }
.wizard textarea {
  width: 100%; max-width: 300px; padding: 0.85rem 1.25rem; border-radius: 0.75rem;
  font-size: 1.1rem; outline: none; resize: none;
  background: rgba(255,255,255,0.05); color: #fff;
  border: 1px solid rgba(255,255,255,0.08);
  font-family: 'SF Mono', 'Fira Code', monospace;
  transition: border-color 0.2s;
}
body.light .wizard textarea {
  background: rgba(0,0,0,0.04); color: #000;
  border-color: rgba(0,0,0,0.1);
}
.wizard textarea { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif; }
.wizard textarea:focus { border-color: rgba(255,255,255,0.2); }
body.light .wizard textarea:focus { border-color: rgba(0,0,0,0.2); }
.wizard textarea::placeholder { opacity: 0.3; }
.dots { display: flex; gap: 0.5rem; margin-bottom: 2rem; }
.dots span { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.15); transition: all 0.4s; }
.dots span.active { background: #fff; animation: pulse 2s ease-in-out infinite; }
.dots span.done { background: rgba(255,255,255,0.6); }
body.light .dots span { background: rgba(0,0,0,0.15); }
body.light .dots span.active { background: #000; }
body.light .dots span.done { background: rgba(0,0,0,0.4); }
.nav-btns { margin-top: 2.5rem; display: flex; gap: 1rem; }
.btn-back {
  padding: 0.75rem 2rem; border-radius: 0.75rem; font-size: 0.875rem;
  background: none; border: none; color: rgba(255,255,255,0.5); cursor: pointer;
}
body.light .btn-back { color: rgba(0,0,0,0.4); }
.btn-next {
  padding: 0.75rem 2rem; border-radius: 0.75rem; font-size: 0.875rem;
  font-weight: 500; border: none; cursor: pointer;
  background: #fff; color: #000;
  transition: opacity 0.2s, transform 0.1s;
}
body.light .btn-next { background: #000; color: #fff; }
.btn-next:disabled { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.3); cursor: not-allowed; }
body.light .btn-next:disabled { background: rgba(0,0,0,0.08); color: rgba(0,0,0,0.25); }
.btn-next:not(:disabled):active { transform: scale(0.97); }
.step-content { animation: slideInLeft 0.3s ease forwards; }
.step-content.exit { animation: slideOutLeft 0.3s ease forwards; }

/* ── Wallpaper ── */
.wallpaper {
  position: relative; min-height: 100vh; min-height: 100dvh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  overflow: hidden; user-select: none;
  padding: 2rem;
}
.wallpaper.light-mode { background: #fff; color: #000; }

.bg-image {
  position: absolute; inset: 0; z-index: 0; overflow: hidden;
}
.bg-image img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.5); }
.bg-image .overlay-dark {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.6) 100%);
}
.bg-image .overlay-light {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0.6) 100%);
}

.accent-glow {
  position: absolute; inset: 0; z-index: 0; pointer-events: none;
  background: radial-gradient(ellipse at 50% 50%, rgba(var(--accent-rgb), 0.03) 0%, transparent 70%);
}

.wp-content {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center;
  width: 100%;
  opacity: 0;
  animation: fadeIn 1s ease 0.1s forwards;
}

.time-block { display: flex; flex-direction: column; align-items: center; gap: 0.25rem; }
.time-row { display: flex; align-items: baseline; gap: 0.5rem; }
.time-num { font-size: inherit; font-weight: 300; letter-spacing: -0.02em; line-height: 1.1; }
.time-label {
  font-size: 0.4em; font-weight: 300; opacity: 0.5;
  letter-spacing: 0.1em; text-transform: uppercase;
}

.divider-wrap { max-width: 200px; width: 100%; margin: 0 auto; }
.divider-wrap hr {
  border: none; border-top: 1px solid rgba(255,255,255,0.12);
}
.wallpaper.light-mode .divider-wrap hr { border-top-color: rgba(0,0,0,0.1); }
.divider-wrap.dashed hr { border-top-style: dashed; border-top-width: 1px; border-top-color: rgba(255,255,255,0.18); }
.wallpaper.light-mode .divider-wrap.dashed hr { border-top-color: rgba(0,0,0,0.15); }
.divider-wrap.dotted hr { border-top-style: dotted; }
.divider-wrap.gradient hr { border: none; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), rgba(255,255,255,0.25), rgba(255,255,255,0.2), transparent); }
.wallpaper.light-mode .divider-wrap.gradient hr { background: linear-gradient(90deg, transparent, rgba(0,0,0,0.1), rgba(0,0,0,0.15), rgba(0,0,1,0.1), transparent); }
.divider-wrap.none { display: none; }

.goal-text {
  text-align: center; padding: 0 2rem; max-width: 480px;
  font-weight: 300; letter-spacing: 0.05em; line-height: 1.6;
  white-space: pre-line; word-break: break-word;
}

.target-date {
  letter-spacing: 0.2em; text-transform: uppercase; font-weight: 300; opacity: 0.4;
}

.goal-achieved-text {
  font-weight: 300; letter-spacing: 0.1em; opacity: 0.6; text-align: center;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
  background-size: 200% 100%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  animation: shimmer 3s ease-in-out infinite;
}
.wallpaper.light-mode .goal-achieved-text {
  background: linear-gradient(90deg, transparent, rgba(0,0,0,0.5), transparent);
  background-size: 200% 100%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

/* Achieved badge on wallpaper */
.achieved-badge {
  position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
  z-index: 2; display: flex; align-items: center; gap: 0.4rem;
  padding: 0.4rem 0.85rem; border-radius: 2rem;
  background: rgba(255,255,255,0.06); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.08);
  font-size: 0.7rem; opacity: 0.5; letter-spacing: 0.05em; cursor: pointer;
  transition: opacity 0.3s, transform 0.15s;
}
.achieved-badge:active { transform: translateX(-50%) scale(0.95); }
.achieved-badge .badge-icon { font-size: 0.8rem; }
.wallpaper.light-mode .achieved-badge {
  background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.06);
}

/* Add New Goal FAB */
.fab-new-goal {
  position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 30;
  width: 52px; height: 52px; border-radius: 50%; border: none;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5);
  cursor: pointer; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  transition: transform 0.15s, background 0.2s, box-shadow 0.3s;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
}
.fab-new-goal:active { transform: scale(0.9); }
.fab-new-goal svg { width: 22px; height: 22px; }
.wallpaper.light-mode .fab-new-goal {
  background: rgba(0,0,0,0.06); color: rgba(0,0,0,0.4);
  box-shadow: 0 2px 12px rgba(0,0,0,0.1);
}

/* ── Goal Achieved Celebration Screen ── */
.celebration {
  position: fixed; inset: 0; z-index: 100;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 2rem; text-align: center; overflow: hidden;
}
.celebration.dark-bg { background: #000; color: #fff; }
.celebration.light-bg { background: #fff; color: #000; }

.confetti-container {
  position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 0;
}
.confetti-piece {
  position: absolute; width: 8px; height: 8px; border-radius: 2px;
  animation: confettiFall linear forwards;
}

.celeb-content {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center; gap: 1rem;
  opacity: 0; animation: fadeIn 0.8s ease 0.3s forwards;
}

.celeb-trophy {
  font-size: 4rem; animation: trophyBounce 1.5s ease-in-out infinite;
  filter: drop-shadow(0 0 20px rgba(255,215,0,0.4));
}

.celeb-title {
  font-size: 1.8rem; font-weight: 500; letter-spacing: -0.01em;
  background: linear-gradient(135deg, #FFD700 0%, #FFA500 50%, #FFD700 100%);
  background-size: 200% auto;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  animation: shimmer 2s linear infinite;
}

.celeb-goal {
  font-size: 1.1rem; font-weight: 300; opacity: 0.7;
  max-width: 300px; line-height: 1.6; letter-spacing: 0.03em;
}

.celeb-stats {
  display: flex; gap: 2rem; margin-top: 0.5rem;
}
.celeb-stat {
  display: flex; flex-direction: column; align-items: center; gap: 0.2rem;
}
.celeb-stat-val {
  font-size: 1.5rem; font-weight: 300; letter-spacing: -0.02em;
  animation: countPop 0.6s ease forwards;
}
.celeb-stat-label {
  font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.15em; opacity: 0.4;
}

.celeb-buttons {
  display: flex; flex-direction: column; gap: 0.75rem; margin-top: 1.5rem; width: 100%; max-width: 280px;
}
.celeb-btn {
  padding: 0.85rem 1.5rem; border-radius: 0.75rem; font-size: 0.9rem;
  font-weight: 500; border: none; cursor: pointer;
  transition: transform 0.1s, opacity 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 0.5rem;
}
.celeb-btn:active { transform: scale(0.97); }
.celeb-btn-primary {
  background: #fff; color: #000;
}
.celeb-btn-primary.light { background: #000; color: #fff; }
.celeb-btn-secondary {
  background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7);
  border: 1px solid rgba(255,255,255,0.1);
}
.celeb-btn-secondary.light {
  background: rgba(0,0,0,0.05); color: rgba(0,0,0,0.6);
  border-color: rgba(0,0,0,0.08);
}
.celeb-btn svg { width: 16px; height: 16px; }

.celeb-total {
  margin-top: 1rem; font-size: 0.75rem; opacity: 0.3; letter-spacing: 0.1em;
}

/* Ripple rings behind trophy */
.ripple-ring {
  position: absolute; border-radius: 50%; border: 1px solid rgba(255,215,0,0.15);
  width: 120px; height: 120px;
  animation: ripple 2s ease-out infinite;
}
.ripple-ring:nth-child(2) { animation-delay: 0.6s; }
.ripple-ring:nth-child(3) { animation-delay: 1.2s; }

/* ── Achievements History Modal ── */
.achievements-overlay {
  position: fixed; inset: 0; z-index: 80;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  animation: fadeIn 0.2s ease forwards;
  display: flex; align-items: center; justify-content: center; padding: 1.5rem;
}
.achievements-overlay.closing { animation: fadeIn 0.2s ease reverse forwards; }
.achievements-overlay.light-bg { background: rgba(255,255,255,0.7); }

.achievements-modal {
  width: 100%; max-width: 380px; max-height: 70vh;
  background: #0a0a0a; color: #e0e0e0;
  border-radius: 1.25rem; overflow: hidden;
  animation: scaleIn 0.3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  display: flex; flex-direction: column;
  border: 1px solid rgba(255,255,255,0.06);
}
.achievements-modal.light-mode {
  background: #f5f5f5; color: #1a1a1a;
  border-color: rgba(0,0,0,0.06);
}
.achievements-modal.closing { animation: scaleIn 0.2s ease reverse forwards; }

.am-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.25rem 1.5rem;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.achievements-modal.light-mode .am-header { border-bottom-color: rgba(0,0,0,0.06); }
.am-header h2 { font-size: 1.05rem; font-weight: 500; display: flex; align-items: center; gap: 0.5rem; }
.am-close {
  width: 32px; height: 32px; border-radius: 50%; border: none;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.06); color: #999; cursor: pointer;
}
.achievements-modal.light-mode .am-close { background: rgba(0,0,0,0.05); color: #666; }
.am-close svg { width: 14px; height: 14px; }

.am-body {
  padding: 1rem 1.5rem 1.5rem; overflow-y: auto; -webkit-overflow-scrolling: touch;
  flex: 1;
}

.am-empty {
  text-align: center; padding: 2rem 0; opacity: 0.3; font-size: 0.85rem;
}

.am-item {
  padding: 1rem 0; border-bottom: 1px solid rgba(255,255,255,0.04);
  animation: fadeIn 0.3s ease forwards;
}
.achievements-modal.light-mode .am-item { border-bottom-color: rgba(0,0,0,0.04); }
.am-item:last-child { border-bottom: none; }
.am-item-goal {
  font-size: 0.95rem; font-weight: 400; margin-bottom: 0.35rem; line-height: 1.4;
}
.am-item-meta {
  display: flex; gap: 1rem; font-size: 0.7rem; opacity: 0.4; letter-spacing: 0.03em;
}
.am-item-meta span { display: flex; align-items: center; gap: 0.3rem; }

.am-footer {
  padding: 1rem 1.5rem 1.25rem;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.achievements-modal.light-mode .am-footer { border-top-color: rgba(0,0,0,0.06); }
.am-footer-btn {
  width: 100%; padding: 0.75rem; border-radius: 0.75rem;
  font-size: 0.85rem; font-weight: 500; border: none;
  background: #fff; color: #000; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  transition: transform 0.1s;
}
.am-footer-btn:active { transform: scale(0.97); }
.am-footer-btn svg { width: 14px; height: 14px; }
.achievements-modal.light-mode .am-footer-btn { background: #000; color: #fff; }

/* ── Settings Gear ── */
.gear-btn {
  position: fixed; top: 1.25rem; right: 1.25rem; z-index: 40;
  width: 44px; height: 44px; border-radius: 50%; border: none;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.3);
  cursor: pointer; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  transition: transform 0.15s, background 0.2s;
}
.gear-btn:active { transform: scale(0.9); }
.wallpaper.light-mode .gear-btn { background: rgba(0,0,0,0.04); color: rgba(0,0,0,0.25); }
.gear-btn svg { width: 20px; height: 20px; }

/* ── Settings Panel ── */
.settings-overlay {
  position: fixed; inset: 0; z-index: 45;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  animation: fadeIn 0.2s ease forwards;
}
.settings-overlay.closing { animation: fadeIn 0.2s ease reverse forwards; }

.settings-panel {
  position: fixed; right: 0; top: 0; height: 100%; width: 100%; max-width: 400px;
  z-index: 50; overflow-y: auto; -webkit-overflow-scrolling: touch;
  background: #0a0a0a; color: #e0e0e0;
  border-left: 1px solid rgba(255,255,255,0.06);
  animation: slideInRight 0.3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
}
.settings-panel.light-mode { background: #f5f5f5; color: #1a1a1a; border-left-color: rgba(0,0,0,0.06); }
.settings-panel.closing { animation: slideOutRight 0.3s cubic-bezier(0.22, 1, 0.36, 1) forwards; }

.sp-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.25rem 1.5rem;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.settings-panel.light-mode .sp-header { border-bottom-color: rgba(0,0,0,0.06); }
.sp-header h2 { font-size: 1.05rem; font-weight: 500; letter-spacing: -0.01em; }
.sp-close {
  width: 36px; height: 36px; border-radius: 50%; border: none;
  display: flex; align-items: center; justify-content: center;
  background: none; color: #999; cursor: pointer;
}
.settings-panel.light-mode .sp-close { color: #666; }

.sp-body { padding: 1.5rem; }
.sp-section { margin-bottom: 2rem; }
.sp-section-title {
  display: flex; align-items: center; gap: 0.5rem;
  margin-bottom: 1rem; font-size: 0.75rem; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.5;
}
.sp-section-title svg { width: 14px; height: 14px; opacity: 0.7; }

/* Theme buttons */
.theme-btns { display: flex; gap: 0.75rem; }
.theme-btn {
  flex: 1; padding: 0.75rem; border-radius: 0.75rem;
  font-size: 0.8rem; font-weight: 500; border: 1px solid rgba(255,255,255,0.08);
  background: transparent; color: #e0e0e0; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  transition: all 0.2s;
}
.theme-btn svg { width: 14px; height: 14px; }
.theme-btn.active { background: #fff; color: #000; border-color: transparent; }
.settings-panel.light-mode .theme-btn { border-color: rgba(0,0,0,0.08); color: #1a1a1a; }
.settings-panel.light-mode .theme-btn.active { background: #000; color: #fff; border-color: transparent; }

/* Color row */
.color-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1rem;
}
.color-row label { font-size: 0.85rem; opacity: 0.7; }
.color-row .color-info { display: flex; align-items: center; gap: 0.75rem; }
.color-row .hex { font-size: 0.7rem; opacity: 0.4; font-family: monospace; }
.color-swatch {
  width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
  border: 2px solid rgba(255,255,255,0.12); transition: transform 0.15s;
  position: relative; overflow: hidden;
}
.color-swatch:active { transform: scale(0.9); }
.color-swatch input[type="color"] {
  position: absolute; inset: -10px; width: 60px; height: 60px;
  border: none; cursor: pointer; opacity: 0;
}
.settings-panel.light-mode .color-swatch { border-color: rgba(0,0,0,0.12); }

/* Font grid */
.font-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin-bottom: 1rem; }
.font-btn {
  padding: 0.5rem; border-radius: 0.5rem; font-size: 0.7rem;
  background: rgba(255,255,255,0.04); border: none; color: #ccc;
  cursor: pointer; transition: all 0.15s;
}
.font-btn.active { background: #fff; color: #000; }
.settings-panel.light-mode .font-btn { background: rgba(0,0,0,0.04); color: #333; }
.settings-panel.light-mode .font-btn.active { background: #000; color: #fff; }

/* Slider */
.slider-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 0.5rem;
}
.slider-row label { font-size: 0.85rem; opacity: 0.7; }
.slider-row .val { font-size: 0.7rem; opacity: 0.4; font-family: monospace; }
input[type="range"] {
  width: 100%; height: 4px; border-radius: 2px;
  -webkit-appearance: none; appearance: none; outline: none;
  background: rgba(255,255,255,0.1);
}
.settings-panel.light-mode input[type="range"] { background: rgba(0,0,0,0.1); }
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
  background: #fff; cursor: pointer;
}
.settings-panel.light-mode input[type="range"]::-webkit-slider-thumb { background: #000; }

/* Divider style grid */
.divider-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.5rem; }
.divider-btn {
  padding: 0.5rem 0.25rem; border-radius: 0.5rem; font-size: 0.65rem;
  text-transform: capitalize;
  background: rgba(255,255,255,0.04); border: none; color: #ccc;
  cursor: pointer; transition: all 0.15s;
}
.divider-btn.active { background: #fff; color: #000; }
.settings-panel.light-mode .divider-btn { background: rgba(0,0,0,0.04); color: #333; }
.settings-panel.light-mode .divider-btn.active { background: #000; color: #fff; }

/* Upload */
.upload-area {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 2rem; border-radius: 0.75rem; cursor: pointer;
  border: 2px dashed rgba(255,255,255,0.1); transition: border-color 0.2s;
}
.settings-panel.light-mode .upload-area { border-color: rgba(0,0,0,0.1); }
.upload-area:active { border-color: rgba(255,255,255,0.25); }
.upload-area span { font-size: 0.85rem; opacity: 0.4; }
.upload-area .hint { font-size: 0.7rem; opacity: 0.2; margin-top: 0.25rem; }
.upload-area input { display: none; }

.remove-img {
  margin-top: 0.75rem; font-size: 0.7rem; opacity: 0.4; border: none;
  background: none; color: inherit; cursor: pointer; text-decoration: underline;
}

/* Toggle */
.toggle-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.75rem 1rem; border-radius: 0.75rem;
  background: rgba(255,255,255,0.03);
}
.settings-panel.light-mode .toggle-row { background: rgba(0,0,0,0.03); }
.toggle-row span { font-size: 0.85rem; opacity: 0.7; }
.toggle {
  position: relative; width: 44px; height: 24px; border-radius: 12px;
  background: rgba(255,255,255,0.1); border: none; cursor: pointer;
  transition: background 0.2s;
}
.toggle.on { background: #fff; }
.settings-panel.light-mode .toggle.on { background: #000; }
.toggle::after {
  content: ''; position: absolute; top: 2px; left: 2px;
  width: 20px; height: 20px; border-radius: 50%;
  background: #666; transition: all 0.2s;
}
.toggle.on::after { left: 22px; background: #000; }
.settings-panel.light-mode .toggle.on::after { background: #fff; }
.settings-panel.light-mode .toggle::after { background: #999; }

/* Goal management buttons in settings */
.sp-action-btn {
  width: 100%; padding: 0.75rem; border-radius: 0.75rem;
  font-size: 0.8rem; font-weight: 500; border: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  transition: background 0.2s, transform 0.1s; margin-bottom: 0.5rem;
}
.sp-action-btn:active { transform: scale(0.97); }
.sp-action-btn svg { width: 14px; height: 14px; }
.sp-action-btn.primary {
  background: #fff; color: #000;
}
.settings-panel.light-mode .sp-action-btn.primary { background: #000; color: #fff; }
.sp-action-btn.secondary {
  background: rgba(255,255,255,0.06); color: #ccc;
}
.settings-panel.light-mode .sp-action-btn.secondary { background: rgba(0,0,0,0.04); color: #333; }

/* Reset */
.reset-btn {
  width: 100%; padding: 0.75rem; border-radius: 0.75rem;
  font-size: 0.8rem; font-weight: 500; border: none;
  background: rgba(255,255,255,0.05); color: #ccc;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  transition: background 0.2s;
}
.settings-panel.light-mode .reset-btn { background: rgba(0,0,0,0.04); color: #333; }
.reset-btn svg { width: 14px; height: 14px; }

.sp-divider {
  margin-top: 1.5rem; padding-top: 1.5rem;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.settings-panel.light-mode .sp-divider { border-top-color: rgba(0,0,0,0.06); }

/* ── Hidden ── */
.hidden { display: none !important; }
</style>
</head>
<body>

<!-- ═══════════ SETUP WIZARD ═══════════ -->

<!-- ═══════════ ACHIEVEMENTS MODAL ═══════════ -->
<div id="achievements-overlay" class="achievements-overlay hidden" onclick="closeAchievements()">

        Start New Goal

</div>

    </div>

  </div>
</div>

<script>
// ═══════════ STATE ═══════════
const DEFAULTS = {
  birthDate: '', goalDate: '', goalText: '',
  textColor: '#ffffff', bgAccentColor: '#000000', dividerColor: '#ffffff',
  isDarkTheme: true, fontSize: 48,
  fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif",
  dividerStyle: 'thin', bgImage: null, bgOpacity: 0.3, breathingEffect: true,
  achievedGoals: [], celebratedGoalId: null
};

let S = { ...DEFAULTS };
let currentStep = 0;
let tickInterval = null;

// ═══════════ PERSIST ═══════════
function save() { try { localStorage.setItem('lwp2', JSON.stringify(S)); } catch(e){} }
function load() {
  try {
    const d = JSON.parse(localStorage.getItem('lwp2'));
    if (d) S = { ...DEFAULTS, ...d };
  } catch(e) {}
}

// ═══════════ TIME CALC ═══════════
function getTimeDiff(from, to) {
  let years = to.getFullYear() - from.getFullYear();
  let months = to.getMonth() - from.getMonth();
  let days = to.getDate() - from.getDate();
  if (days < 0) { months--; days += new Date(to.getFullYear(), to.getMonth(), 0).getDate(); }
  if (months < 0) { years--; months += 12; }
  return { years, months, days };
}

const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtDate(d) { return d.getDate() + ' ' + MONTHS[d.getMonth()] + ' ' + d.getFullYear(); }

// ═══════════ SETUP WIZARD ═══════════
function getStepHTML() {
  const steps = [
    `<div style="text-align:center;">
      <h2>${S.birthDate ? 'Your birthday?' : 'When were you born?'}</h2>
      <p class="sub">This calculates your life progress</p>
      <input type="date" id="inp-birth" value="${S.birthDate}" onchange="S.birthDate=this.value;checkStep()" max="${new Date().toISOString().split('T')[0]}">
    </div>`,
    `<div style="text-align:center;">
      <h2>Your deadline?</h2>
      <p class="sub">When do you want to achieve your goal?</p>
      <input type="date" id="inp-goal" value="${S.goalDate}" onchange="S.goalDate=this.value;checkStep()" min="${new Date().toISOString().split('T')[0]}">
    </div>`,
    `<div style="text-align:center;">
      <h2>What's your goal?</h2>
      <p class="sub">The dream you're working toward</p>
      <textarea id="inp-text" rows="3" placeholder="Build My Dream Career" onchange="S.goalText=this.value;checkStep()" oninput="S.goalText=this.value;checkStep()">${S.goalText}</textarea>
    </div>`
  ];
  return steps;
}

function renderStep() {
  const steps = getStepHTML();
  const c = document.getElementById('step-container');
  c.className = 'step-content';
  c.innerHTML = steps[currentStep];

  if (currentStep === 0) { const el = document.getElementById('inp-birth'); if (el) el.value = S.birthDate; }
  if (currentStep === 1) { const el = document.getElementById('inp-goal'); if (el) el.value = S.goalDate; }
  if (currentStep === 2) { const el = document.getElementById('inp-text'); if (el) el.value = S.goalText; }

  for (let i = 0; i < 3; i++) {
    const dot = document.getElementById('dot' + i);
    dot.className = i < currentStep ? 'done' : i === currentStep ? 'active' : '';
  }

  document.getElementById('btn-back').classList.toggle('hidden', currentStep === 0);
  const nextBtn = document.getElementById('btn-next');
  nextBtn.textContent = currentStep === 2 ? 'Create Wallpaper' : 'Continue';
  checkStep();
}

function checkStep() {
  let ok = false;
  if (currentStep === 0) ok = !!S.birthDate;
  else if (currentStep === 1) ok = !!S.goalDate;
  else if (currentStep === 2) ok = S.goalText.trim().length > 0;
  document.getElementById('btn-next').disabled = !ok;
}

function nextStep() {
  if (currentStep < 2) {
    const c = document.getElementById('step-container');
    c.className = 'step-content exit';
    setTimeout(() => { currentStep++; renderStep(); }, 200);
  } else {
    save();
    S.celebratedGoalId = null;
    save();
    showWallpaper();
  }
}

function prevStep() {
  if (currentStep > 0) {
    const c = document.getElementById('step-container');
    c.className = 'step-content exit';
    setTimeout(() => { currentStep--; renderStep(); }, 200);
  }
}

// ═══════════ CHECK IF GOAL IS ACHIEVED ═══════════
function isGoalAchieved() {
  if (!S.goalDate) return false;
  const goal = new Date(S.goalDate);
  const now = new Date();
  // Goal achieved if today is on or after the goal date
  now.setHours(0,0,0,0);
  goal.setHours(0,0,0,0);
  return goal <= now;
}

function getGoalId(goalDate, goalText) {
  return goalDate + '|' + goalText;
}

function wasGoalAlreadyCelebrated() {
  if (!S.goalDate || !S.goalText) return false;
  const id = getGoalId(S.goalDate, S.goalText);
  return S.celebratedGoalId === id || S.achievedGoals.some(g => g.id === id);
}

// ═══════════ CELEBRATION SCREEN ═══════════
function showCelebration() {
  const goal = new Date(S.goalDate);
  const birth = new Date(S.birthDate);
  const timeTaken = getTimeDiff(birth, goal);

  // Mark as celebrated
  const id = getGoalId(S.goalDate, S.goalText);
  if (!S.achievedGoals.some(g => g.id === id)) {
    S.achievedGoals.push({
      id: id,
      goalText: S.goalText,
      goalDate: S.goalDate,
      achievedDate: new Date().toISOString(),
      timeTaken: timeTaken
    });
  }
  S.celebratedGoalId = id;
  save();

  // Hide wallpaper
  document.getElementById('wallpaper').classList.add('hidden');
  document.getElementById('fab-new').classList.add('hidden');
  document.getElementById('achieved-badge').classList.add('hidden');

  // Show celebration
  const cel = document.getElementById('celebration');
  cel.classList.remove('hidden');
  cel.className = 'celebration ' + (S.isDarkTheme ? 'dark-bg' : 'light-bg');

  // Theme buttons
  const primaryBtn = document.getElementById('celeb-btn-primary');
  const secondaryBtn = document.getElementById('celeb-btn-secondary');
  const historyBtn = document.getElementById('celeb-btn-history');
  if (S.isDarkTheme) {
    primaryBtn.className = 'celeb-btn celeb-btn-primary';
    secondaryBtn.className = 'celeb-btn celeb-btn-secondary';
    historyBtn.className = 'celeb-btn celeb-btn-secondary';
  } else {
    primaryBtn.className = 'celeb-btn celeb-btn-primary light';
    secondaryBtn.className = 'celeb-btn celeb-btn-secondary light';
    historyBtn.className = 'celeb-btn celeb-btn-secondary light';
  }

  document.getElementById('celeb-goal-text').textContent = '"' + S.goalText + '"';

  // Animate stats
  animateStat('celeb-years', timeTaken.years);
  animateStat('celeb-months', timeTaken.months);
  animateStat('celeb-days', timeTaken.days);

  const total = S.achievedGoals.length;
  document.getElementById('celeb-total').textContent = total + (total === 1 ? ' goal achieved so far' : ' goals achieved so far');

  // Confetti!
  spawnConfetti();
}

function animateStat(elId, target) {
  const el = document.getElementById(elId);
  let current = 0;
  const duration = 800;
  const stepTime = 30;
  const steps = duration / stepTime;
  const increment = target / steps;
  const timer = setInterval(() => {
    current += increment;
    if (current >= target) {
      current = target;
      clearInterval(timer);
    }
    el.textContent = Math.round(current);
  }, stepTime);
}

function spawnConfetti() {
  const container = document.getElementById('confetti-container');
  container.innerHTML = '';
  const colors = ['#FFD700', '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFA07A', '#98D8C8', '#F7DC6F', '#BB8FCE', '#85C1E9'];
  const shapes = ['square', 'circle'];

  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    const color = colors[Math.floor(Math.random() * colors.length)];
    const shape = shapes[Math.floor(Math.random() * shapes.length)];
    piece.style.background = color;
    piece.style.left = Math.random() * 100 + '%';
    piece.style.width = (Math.random() * 8 + 4) + 'px';
    piece.style.height = (Math.random() * 8 + 4) + 'px';
    piece.style.borderRadius = shape === 'circle' ? '50%' : '2px';
    piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
    piece.style.animationDelay = (Math.random() * 2) + 's';
    piece.style.opacity = Math.random() * 0.6 + 0.4;
    container.appendChild(piece);
  }
}

function startNewGoalFromCeleb() {
  document.getElementById('celebration').classList.add('hidden');
  currentStep = 1; // Skip birth date, go straight to goal date
  S.goalDate = '';
  S.goalText = '';
  S.celebratedGoalId = null;
  save();
  document.getElementById('wizard').classList.remove('hidden');
  renderStep();
}

function setAsWallpaper() {
  document.getElementById('celebration').classList.add('hidden');
  showWallpaper();
}

function closeCelebrationAndShowHistory() {
  document.getElementById('celebration').classList.add('hidden');
  showWallpaper();
  setTimeout(() => openAchievements(), 400);
}

// ═══════════ WALLPAPER RENDER ═══════════
function showWallpaper() {
  document.getElementById('wizard').classList.add('hidden');
  document.getElementById('celebration').classList.add('hidden');
  const wp = document.getElementById('wallpaper');
  wp.classList.remove('hidden');

  // Check if goal is achieved and not yet celebrated
  if (isGoalAchieved() && !wasGoalAlreadyCelebrated()) {
    showCelebration();
    return;
  }

  applyTheme();
  applySettings();
  tick();
  if (tickInterval) clearInterval(tickInterval);
  tickInterval = setInterval(tick, 60000);

  // Show FAB and badge
  document.getElementById('fab-new').classList.remove('hidden');
  updateAchievedBadge();
}

function updateAchievedBadge() {
  const badge = document.getElementById('achieved-badge');
  if (S.achievedGoals.length > 0) {
    badge.classList.remove('hidden');
    document.getElementById('badge-count').textContent = S.achievedGoals.length;
  } else {
    badge.classList.add('hidden');
  }
}

function tick() {
  const now = new Date();
  const birth = new Date(S.birthDate);
  const goal = new Date(S.goalDate);
  const elapsed = getTimeDiff(birth, now);
  const isPast = goal < now;
  const remaining = isPast ? { years: 0, months: 0, days: 0 } : getTimeDiff(now, goal);

  // Elapsed
  document.getElementById('elapsed-block').innerHTML =
    numRow(elapsed.years, 'Y') + numRow(elapsed.months, 'M') + numRow(elapsed.days, 'D');

  // Goal
  const gb = document.getElementById('goal-block');
  gb.textContent = S.goalText;
  if (isPast) {
    gb.className = 'goal-text goal-achieved-text';
  } else {
    gb.className = S.breathingEffect ? 'goal-text breathe' : 'goal-text';
  }

  // Target date
  document.getElementById('target-date').textContent = fmtDate(goal);

  // Countdown
  if (isPast) {
    const timeTaken = getTimeDiff(birth, goal);
    document.getElementById('countdown-block').innerHTML =
      '<div class="goal-achieved-text num-in" style="font-size:' + Math.max(14, S.fontSize * 0.35) + 'px">Completed in ' +
      timeTaken.years + 'Y ' + timeTaken.months + 'M ' + timeTaken.days + 'D</div>';
  } else {
    document.getElementById('countdown-block').innerHTML =
      numRow(remaining.years, 'Y') + numRow(remaining.months, 'M') + numRow(remaining.days, 'D');
  }

  // Apply font sizes
  const mainSize = S.fontSize + 'px';
  document.getElementById('elapsed-block').style.fontSize = mainSize;
  document.getElementById('countdown-block').style.fontSize = mainSize;
  document.getElementById('goal-block').style.fontSize = Math.max(16, S.fontSize * 0.4) + 'px';
  document.getElementById('target-date').style.fontSize = Math.max(12, S.fontSize * 0.28) + 'px';
}

function numRow(val, label) {
  return '<div class="time-row num-in"><span class="time-num">' + val + '</span><span class="time-label">' + label + '</span></div>';
}

function applyTheme() {
  const wp = document.getElementById('wallpaper');
  wp.classList.toggle('light-mode', !S.isDarkTheme);
  wp.style.background = S.isDarkTheme ? '#000' : '#fff';
  wp.style.color = S.textColor;
  wp.style.fontFamily = S.fontFamily;

  // BG image
  const bgEl = document.getElementById('bg-image');
  const overlay = document.getElementById('bg-overlay');
  if (S.bgImage) {
    bgEl.classList.remove('hidden');
    document.getElementById('bg-img').src = S.bgImage;
    bgEl.style.opacity = S.bgOpacity;
    overlay.className = S.isDarkTheme ? 'overlay-dark' : 'overlay-light';
  } else {
    bgEl.classList.add('hidden');
  }

  // Dividers
  ['divider1', 'divider2'].forEach(id => {
    const el = document.getElementById(id);
    el.className = 'divider-wrap ' + S.dividerStyle;
    const hr = el.querySelector('hr');
    if (hr) {
      if (S.dividerStyle === 'gradient') {
        const c = S.dividerColor;
        if (S.isDarkTheme) {
          hr.style.background = 'linear-gradient(90deg, transparent, ' + c + '30, ' + c + '45, ' + c + '30, transparent)';
        } else {
          hr.style.background = 'linear-gradient(90deg, transparent, ' + c + '18, ' + c + '28, ' + c + '18, transparent)';
        }
      } else if (S.dividerStyle === 'thin') {
        hr.style.borderTopColor = S.isDarkTheme ? S.dividerColor + '20' : S.dividerColor + '15';
      } else {
        hr.style.borderTopColor = S.isDarkTheme ? S.dividerColor + '28' : S.dividerColor + '18';
      }
    }
  });

  // Gear button
  const gear = document.querySelector('.gear-btn');
  if (S.isDarkTheme) {
    gear.style.background = 'rgba(255,255,255,0.06)';
    gear.style.color = 'rgba(255,255,255,0.3)';
  } else {
    gear.style.background = 'rgba(0,0,0,0.04)';
    gear.style.color = 'rgba(0,0,0,0.25)';
  }

  // FAB
  const fab = document.getElementById('fab-new');
  if (S.isDarkTheme) {
    fab.style.background = 'rgba(255,255,255,0.08)';
    fab.style.color = 'rgba(255,255,255,0.5)';
  } else {
    fab.style.background = 'rgba(0,0,0,0.06)';
    fab.style.color = 'rgba(0,0,0,0.4)';
  }

  // Badge
  const badge = document.getElementById('achieved-badge');
  if (S.isDarkTheme) {
    badge.style.background = 'rgba(255,255,255,0.06)';
    badge.style.borderColor = 'rgba(255,255,255,0.08)';
  } else {
    badge.style.background = 'rgba(0,0,0,0.04)';
    badge.style.borderColor = 'rgba(0,0,0,0.06)';
  }
}

function applySettings() {
  const wpContent = document.querySelector('.wp-content');
  wpContent.style.animation = 'none';
  wpContent.offsetHeight;
  wpContent.style.animation = 'fadeIn 1s ease 0.1s forwards';
  wpContent.style.opacity = '0';
  tick();
}

// ═══════════ ADD NEW GOAL ═══════════
function addNewGoal() {
  // Archive current goal if it exists and is achieved
  if (S.goalDate && S.goalText && isGoalAchieved()) {
    const id = getGoalId(S.goalDate, S.goalText);
    if (!S.achievedGoals.some(g => g.id === id)) {
      const goal = new Date(S.goalDate);
      const birth = new Date(S.birthDate);
      S.achievedGoals.push({
        id: id,
        goalText: S.goalText,
        goalDate: S.goalDate,
        achievedDate: new Date().toISOString(),
        timeTaken: getTimeDiff(birth, goal)
      });
    }
  }

  S.goalDate = '';
  S.goalText = '';
  S.celebratedGoalId = null;
  save();

  document.getElementById('wallpaper').classList.add('hidden');
  document.getElementById('fab-new').classList.add('hidden');
  document.getElementById('achieved-badge').classList.add('hidden');
  if (tickInterval) clearInterval(tickInterval);

  currentStep = 1; // Skip birth date step
  document.getElementById('wizard').classList.remove('hidden');
  renderStep();
}

function addNewGoalFromHistory() {
  closeAchievements();
  setTimeout(() => addNewGoal(), 300);
}

function addNewGoalFromSettings() {
  closeSettings();
  setTimeout(() => addNewGoal(), 300);
}

// ═══════════ ACHIEVEMENTS MODAL ═══════════
function openAchievements() {
  const overlay = document.getElementById('achievements-overlay');
  const modal = document.getElementById('achievements-modal');
  overlay.classList.remove('hidden', 'closing');
  modal.classList.remove('hidden', 'closing');

  // Theme
  overlay.className = 'achievements-overlay ' + (S.isDarkTheme ? '' : 'light-bg');
  modal.classList.toggle('light-mode', !S.isDarkTheme);

  // Also theme the footer button
  const footerBtn = document.getElementById('am-new-btn');
  footerBtn.className = 'am-footer-btn' + (S.isDarkTheme ? '' : ' light-mode-style');
  if (!S.isDarkTheme) {
    footerBtn.style.background = '#000';
    footerBtn.style.color = '#fff';
  } else {
    footerBtn.style.background = '#fff';
    footerBtn.style.color = '#000';
  }

  renderAchievementsList();
}

function closeAchievements() {
  const overlay = document.getElementById('achievements-overlay');
  const modal = document.getElementById('achievements-modal');
  overlay.classList.add('closing');
  modal.classList.add('closing');
  setTimeout(() => {
    overlay.classList.add('hidden');
    modal.classList.add('hidden');
  }, 250);
}

function openAchievementsFromSettings() {
  closeSettings();
  setTimeout(() => openAchievements(), 300);
}

function renderAchievementsList() {
  const body = document.getElementById('achievements-body');
  if (S.achievedGoals.length === 0) {
    body.innerHTML = '<div class="am-empty">No achievements yet.<br>Complete your first goal!</div>';
    return;
  }

  let html = '';
  // Show in reverse order (newest first)
  const goals = [...S.achievedGoals].reverse();
  goals.forEach((g, i) => {
    const achievedDate = new Date(g.achievedDate);
    const tt = g.timeTaken || { years: 0, months: 0, days: 0 };
    html += '<div class="am-item" style="animation-delay:' + (i * 0.05) + 's">' +
      '<div class="am-item-goal">' + escapeHtml(g.goalText) + '</div>' +
      '<div class="am-item-meta">' +
        '<span>&#128197; Target: ' + fmtDate(new Date(g.goalDate)) + '</span>' +
        '<span>&#9989; Done: ' + fmtDate(achievedDate) + '</span>' +
      '</div>' +
      '<div class="am-item-meta" style="margin-top:0.25rem">' +
        '<span>&#9201; Took: ' + tt.years + 'Y ' + tt.months + 'M ' + tt.days + 'D</span>' +
      '</div>' +
    '</div>';
  });
  body.innerHTML = html;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ═══════════ SETTINGS PANEL ═══════════
function openSettings() {
  const overlay = document.getElementById('settings-overlay');
  const panel = document.getElementById('settings-panel');
  overlay.classList.remove('hidden', 'closing');
  panel.classList.remove('hidden', 'closing');
  syncSettingsUI();
}

function closeSettings() {
  const overlay = document.getElementById('settings-overlay');
  const panel = document.getElementById('settings-panel');
  overlay.classList.add('closing');
  panel.classList.add('closing');
  setTimeout(() => {
    overlay.classList.add('hidden');
    panel.classList.add('hidden');
  }, 250);
  save();
  applyTheme();
  applySettings();
  updateAchievedBadge();
}

function syncSettingsUI() {
  // Achieved count
  document.getElementById('sp-achieved-count').textContent = S.achievedGoals.length;

  // Theme
  document.getElementById('theme-dark').classList.toggle('active', S.isDarkTheme);
  document.getElementById('theme-light').classList.toggle('active', !S.isDarkTheme);

  // Colors
  document.getElementById('hex-text').textContent = S.textColor;
  document.getElementById('swatch-text').style.background = S.textColor;
  document.querySelector('#swatch-text input').value = S.textColor;

  document.getElementById('hex-accent').textContent = S.bgAccentColor;
  document.getElementById('swatch-accent').style.background = S.bgAccentColor;
  document.querySelector('#swatch-accent input').value = S.bgAccentColor;

  document.getElementById('hex-divider').textContent = S.dividerColor;
  document.getElementById('swatch-divider').style.background = S.dividerColor;
  document.querySelector('#swatch-divider input').value = S.dividerColor;

  // Font
  document.querySelectorAll('.font-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.font === S.fontFamily);
  });
  document.getElementById('font-size-range').value = S.fontSize;
  document.getElementById('font-size-val').textContent = S.fontSize + 'px';

  // Divider style
  document.querySelectorAll('.divider-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.style === S.dividerStyle);
  });

  // Breathing
  document.getElementById('breathe-toggle').classList.toggle('on', S.breathingEffect);

  // BG image
  if (S.bgImage) {
    document.getElementById('upload-text').textContent = 'Change image';
    document.getElementById('opacity-controls').classList.remove('hidden');
    document.getElementById('opacity-range').value = Math.round(S.bgOpacity * 100);
    document.getElementById('opacity-val').textContent = Math.round(S.bgOpacity * 100) + '%';
  } else {
    document.getElementById('upload-text').textContent = 'Upload image';
    document.getElementById('opacity-controls').classList.add('hidden');
  }

  // Panel theme
  document.getElementById('settings-panel').classList.toggle('light-mode', !S.isDarkTheme);
}

function setTheme(dark) {
  S.isDarkTheme = dark;
  syncSettingsUI();
  save();
}

function setColor(key, val) {
  S[key] = val;
  if (key === 'textColor') { document.getElementById('hex-text').textContent = val; document.getElementById('swatch-text').style.background = val; }
  if (key === 'bgAccentColor') { document.getElementById('hex-accent').textContent = val; document.getElementById('swatch-accent').style.background = val; }
  if (key === 'dividerColor') { document.getElementById('hex-divider').textContent = val; document.getElementById('swatch-divider').style.background = val; }
  save();
}

function setFont(btn) {
  S.fontFamily = btn.dataset.font;
  document.querySelectorAll('.font-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  save();
}

function setFontSize(val) {
  S.fontSize = parseInt(val);
  document.getElementById('font-size-val').textContent = val + 'px';
  save();
}

function setDivider(btn) {
  S.dividerStyle = btn.dataset.style;
  document.querySelectorAll('.divider-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  save();
}

function handleImageUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    S.bgImage = ev.target.result;
    document.getElementById('upload-text').textContent = 'Change image';
    document.getElementById('opacity-controls').classList.remove('hidden');
    save();
  };
  reader.readAsDataURL(file);
}

function removeImage() {
  S.bgImage = null;
  document.getElementById('upload-text').textContent = 'Upload image';
  document.getElementById('opacity-controls').classList.add('hidden');
  document.getElementById('upload-area').querySelector('input').value = '';
  save();
}

function setBgOpacity(val) {
  S.bgOpacity = parseInt(val) / 100;
  document.getElementById('opacity-val').textContent = val + '%';
  save();
}

function toggleBreathe() {
  S.breathingEffect = !S.breathingEffect;
  document.getElementById('breathe-toggle').classList.toggle('on', S.breathingEffect);
  save();
}

function resetSettings() {
  S = { ...DEFAULTS, birthDate: S.birthDate, goalDate: S.goalDate, goalText: S.goalText, achievedGoals: S.achievedGoals, celebratedGoalId: S.celebratedGoalId };
  syncSettingsUI();
  save();
}

// ═══════════ INIT ═══════════
(function init() {
  load();
  if (S.birthDate && S.goalDate && S.goalText.trim()) {
    // Has existing goal data - check if achieved
    if (isGoalAchieved() && !wasGoalAlreadyCelebrated()) {
      // Show wallpaper briefly then celebrate
      showWallpaper();
      setTimeout(() => showCelebration(), 500);
    } else {
      showWallpaper();
    }
  } else {
    renderStep();
  }
})();
</script>
</body>
</html>
